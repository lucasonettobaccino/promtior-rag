<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promtior RAG Assistant</title>
    <link rel="icon" type="image/png" href="/static/assets/logo.jpeg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(
          135deg,
          #020624 0%,
          #0a1540 50%,
          #0d3b4a 100%
        );
      }
      .glass {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .message-bubble {
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .typing-indicator span {
        animation: blink 1.4s infinite;
      }
      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes blink {
        0%,
        80%,
        100% {
          opacity: 0.3;
        }
        40% {
          opacity: 1;
        }
      }
      .markdown-content a {
        color: #5eead4;
        text-decoration: underline;
        word-break: break-all;
      }
      .markdown-content strong {
        font-weight: 600;
        color: #fff;
      }
      .markdown-content ul,
      .markdown-content ol {
        margin-left: 1.25rem;
        margin-top: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .markdown-content li {
        margin-bottom: 0.25rem;
      }
      .markdown-content p {
        margin-bottom: 0.5rem;
      }
      .markdown-content code {
        background: rgba(0, 0, 0, 0.3);
        padding: 0.125rem 0.375rem;
        border-radius: 0.25rem;
        font-family: "SF Mono", Monaco, Consolas, monospace;
        font-size: 0.875em;
      }
      /* Custom scrollbar */
      #chat::-webkit-scrollbar {
        width: 6px;
      }
      #chat::-webkit-scrollbar-track {
        background: transparent;
      }
      #chat::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      #chat::-webkit-scrollbar-thumb:hover {
        background: rgba(94, 234, 212, 0.3);
      }
      #chat {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
      }
      ::selection {
        background: rgba(94, 234, 212, 0.3);
      }
    </style>
  </head>
  <body class="text-gray-100">
    <div class="h-full flex flex-col">
      <!-- Header -->
      <header class="glass border-b border-white/10 shrink-0">
        <div
          class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-lg flex items-center justify-center"
              style="background-color: #0a0e27"
            >
              <img
                src="/static/assets/logo.jpeg"
                alt="Promtior"
                class="w-full h-full object-contain"
              />
            </div>
            <div>
              <h1 class="text-lg font-semibold">Promtior RAG Assistant</h1>
              <p class="text-xs text-gray-400">
                Ask me anything about Promtior
              </p>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span
              class="inline-block w-2 h-2 rounded-full bg-green-400 animate-pulse"
            ></span>
            <span class="text-xs text-gray-400">Online</span>
          </div>
        </div>
      </header>

      <!-- Chat area -->
      <main
        class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto px-6 py-6 min-h-0"
      >
        <div
          id="chat"
          class="flex-1 overflow-y-auto space-y-4 pr-2 mb-4 min-h-0"
        >
          <!-- Welcome message -->
          <div class="message-bubble flex gap-3">
            <div
              class="w-8 h-8 rounded-full flex items-center justify-center shrink-0"
              style="background-color: #0a0e27"
            >
              <img
                src="/static/assets/logo.jpeg"
                alt="Promtior"
                class="w-full h-full object-contain"
              />
            </div>
            <div class="glass rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%]">
              <p class="text-sm">
                Hi! I'm Promtior's RAG assistant. Ask me about our services,
                history, or anything you'd like to know.
              </p>
              <p class="text-xs text-gray-400 mt-2">
                Each question is answered independently based on Promtior's
                public content.
              </p>
              <div class="mt-3 flex flex-wrap gap-2">
                <button
                  onclick="sendSuggestion('What services does Promtior offer?')"
                  class="text-xs px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition"
                >
                  What services do you offer?
                </button>
                <button
                  onclick="sendSuggestion('When was Promtior founded?')"
                  class="text-xs px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition"
                >
                  When was Promtior founded?
                </button>
                <button
                  onclick="
                    sendSuggestion('Which organizations work with Promtior?')
                  "
                  class="text-xs px-3 py-1.5 rounded-full bg-white/5 hover:bg-white/10 border border-white/10 transition"
                >
                  Who are your clients?
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Input area -->
        <div class="glass rounded-2xl p-2 flex gap-2 items-end shrink-0">
          <textarea
            id="input"
            rows="1"
            placeholder="Ask about Promtior..."
            class="flex-1 bg-transparent px-3 py-2 text-sm placeholder-gray-500 focus:outline-none resize-none max-h-32"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
          ></textarea>
          <button
            id="send"
            onclick="sendMessage()"
            class="px-4 py-2 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-600 hover:from-teal-400 hover:to-cyan-500 disabled:opacity-40 disabled:cursor-not-allowed transition text-sm font-medium"
          >
            Send
          </button>
        </div>

        <div class="text-center mt-3 text-xs text-gray-500 shrink-0">
          <a href="/docs" class="text-teal-400 hover:text-teal-300 transition"
            >API Docs</a
          >
          <span class="mx-2">•</span>
          <a
            href="/chat/playground/"
            class="text-teal-400 hover:text-teal-300 transition"
            >Playground</a
          >
        </div>
      </main>
    </div>

    <script>
      const chatEl = document.getElementById("chat");
      const inputEl = document.getElementById("input");
      const sendEl = document.getElementById("send");

      function autoResize(el) {
        el.style.height = "auto";
        el.style.height = Math.min(el.scrollHeight, 128) + "px";
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      function sendSuggestion(text) {
        inputEl.value = text;
        sendMessage();
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatEl.scrollTo({
            top: chatEl.scrollHeight,
            behavior: "smooth",
          });
        });
      }

      function appendUserMessage(text) {
        const el = document.createElement("div");
        el.className = "message-bubble flex gap-3 justify-end";
        el.innerHTML = `
                <div class="bg-gradient-to-br from-teal-600 to-cyan-700 rounded-2xl rounded-tr-sm px-4 py-3 max-w-[85%]">
                    <p class="text-sm whitespace-pre-wrap">${escapeHtml(text)}</p>
                </div>
            `;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      function appendTypingIndicator() {
        const el = document.createElement("div");
        el.id = "typing";
        el.className = "message-bubble flex gap-3";
        el.innerHTML = `
            <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background-color: #0a0e27;"><img src="/static/assets/logo.jpeg" alt="Promtior" class="w-full h-full object-contain"></div>
                <div class="glass rounded-2xl rounded-tl-sm px-4 py-3">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                        <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                        <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                    </div>
                </div>
            `;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      function removeTypingIndicator() {
        const el = document.getElementById("typing");
        if (el) el.remove();
      }

      function appendAssistantMessage(markdown) {
        const el = document.createElement("div");
        el.className = "message-bubble flex gap-3";

        // Pre-process [source: URL] citations into HTML links
        // Handles both [source: URL] and [source: URL1, URL2, ...]
        const preprocessed = markdown.replace(
          /\[source:\s*([^\]]+)\]/g,
          (match, content) => {
            const urls = content.split(",").map((s) => s.trim());
            const links = urls
              .map((url) => {
                // Only linkify if it looks like a URL or file path
                if (url.startsWith("http://") || url.startsWith("https://")) {
                  return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
                }
                return url;
              })
              .join(", ");
            return `[source: ${links}]`;
          },
        );

        const rendered = marked.parse(preprocessed);
        el.innerHTML = `
    <div class="w-8 h-8 rounded-full flex items-center justify-center shrink-0" style="background-color: #0a0e27;"><img src="/static/assets/logo.jpeg" alt="Promtior" class="w-full h-full object-contain"></div>
        <div class="glass rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] markdown-content text-sm">
            ${rendered}
        </div>
    `;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      function appendErrorMessage(text) {
        const el = document.createElement("div");
        el.className = "message-bubble flex gap-3";
        el.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-sm font-bold shrink-0">!</div>
                <div class="bg-red-500/10 border border-red-500/20 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[85%] text-sm text-red-200">
                    ${escapeHtml(text)}
                </div>
            `;
        chatEl.appendChild(el);
        scrollToBottom();
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        inputEl.value = "";
        autoResize(inputEl);
        sendEl.disabled = true;

        appendUserMessage(text);
        appendTypingIndicator();

        try {
          const response = await fetch("/chat/invoke", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ input: { question: text } }),
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const data = await response.json();
          removeTypingIndicator();
          appendAssistantMessage(data.output.answer);
        } catch (err) {
          removeTypingIndicator();
          appendErrorMessage(`Sorry, something went wrong: ${err.message}`);
        } finally {
          sendEl.disabled = false;
          inputEl.focus();
        }
      }

      inputEl.focus();
    </script>
  </body>
</html>
